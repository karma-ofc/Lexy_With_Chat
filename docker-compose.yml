services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "5173", "--strictPort"]
    environment:
      VITE_DOCKER: "1"
      VITE_MAIN_API_PROXY_TARGET: http://main-server:3000
      VITE_CHAT_API_PROXY_TARGET: http://chat-server:3001
    depends_on:
      main-server:
        condition: service_started
      chat-server:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/01-init-databases.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  main-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "server/server.js"]
    environment:
      PORT: ${MAIN_PORT:-3000}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      DB_NAME: ${MAIN_DB_NAME:-lexy}
      CHAT_API_URL: ${MAIN_CHAT_API_URL:-http://chat-server:3001}
      JWT_SECRET: ${JWT_SECRET:-2026}
      YANDEX_DICT_API_KEY: ${YANDEX_DICT_API_KEY:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-BCGYOSd3_aY2jVM4OVhEYz6iPHYqsMuBwtUw29Zc-aXF4bT2Qii6PZy8T8gkPmFlKYVxwvSGicRJ0d3vEnmJNuc}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-C0-VtuiKEba2LHtMJ1Qi26EFvmY9gp4bh0SD8FhcuSM}
    depends_on:
      postgres:
        condition: service_healthy
      chat-server:
        condition: service_started
    ports:
      - "3000:3000"

  chat-server:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "server/server_chat.js"]
    environment:
      PORT: ${CHAT_PORT:-3001}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      DB_NAME: ${CHAT_DB_NAME:-chat}
      JWT_SECRET: ${JWT_SECRET:-2026}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3001:3001"

volumes:
  postgres-data: